<!DOCTYPE html>
<html lang="{{ .Site.LanguageCode }}">
{{ partial "head.html" }}
<body>
  <div class="body">
    {{ if page.Params.nav }}
      {{ partial "sidenav.html" }}
    {{ end }}
    <div class="main-container">
      {{ partial "header.html" }}
      <main>
        <span id="top"></span>
        {{ block "main" . }}{{ end }}
      </main>
      {{ partial "footer.html" }}
    </div>
  </div>
</body>
</html>
